<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>宇宙幾何形狀軌跡動畫</title>
    <style>
        /* 全域初始化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #05070f;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        /* 1. 星空畫布空間 */
        .stage {
            position: relative;
            width: 800px;
            height: 600px;
            background: radial-gradient(circle at center, #111a36 0%, #05070f 70%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 2. 背景圓形軌跡裝飾線 */
        .track-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 360px;
            height: 360px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* 3. 各節點固定文字標籤說明 */
        .label {
            position: absolute;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.4;
            pointer-events: none;
        }
        .label b { color: #fff; }
        
        .label-0 { top: 70px; left: 160px; }
        .label-20 { top: 70px; right: 80px; text-align: right; }
        .label-40 { top: 250px; right: 50px; }
        .label-60 { bottom: 180px; right: 70px; }
        .label-80 { bottom: 40px; left: 270px; text-align: center; }

        /* 4. 動態核心元件：利用 CSS 讓它沿著圓形路徑（offset-path）滑行 */
        .cosmic-carrier {
            position: absolute;
            width: 100px;
            height: 100px;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* 定義一個直徑 360px 的圓形移動路徑 */
            offset-path: ray(0deg closest-side); /* 備用架構 */
            offset-path: path('M 400,120 A 180,180 0 1,1 399.9,120 Z'); 
            
            /* 綁定路徑移動動畫：10秒、無限循環、均速 */
            animation: orbitMove 10s infinite linear;
        }

        /* 5. 負責形狀、3D旋轉與發光的本體元件 */
        .morph-core {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            
            /* 綁定形狀與特效變換動畫：必須與路徑移動完全同步 */
            animation: shapeMorph 10s infinite linear;
        }

        /* -------------------------------------------------------
           動畫一：控制位置（沿著圓形軌跡 0% ~ 100% 前進）
           ------------------------------------------------------- */
        @keyframes orbitMove {
            0% { offset-distance: 0%; }
            100% { offset-distance: 100%; }
        }

        /* -------------------------------------------------------
           動畫二：控制形狀、顏色、3D翻轉、縮放與發光（依據軌跡進度改變）
           ------------------------------------------------------- */
        @keyframes shapeMorph {
            /* 0% 起點：藍色正方形 (對應左上方) */
            0%, 100% {
                background-color: #00d2ff;
                clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
                border-radius: 0%;
                transform: scale(1) rotate(0deg);
                filter: drop-shadow(0 0 15px #00d2ff);
            }

            /* 20% 節點：綠色三角形 (旋轉中) */
            20% {
                background-color: #00ff87;
                clip-path: polygon(50% 0%, 100% 100%, 100% 100%, 0% 100%);
                border-radius: 0%;
                transform: scale(1.1) rotate(120deg) rotateY(180deg);
                filter: drop-shadow(0 0 25px #00ff87);
            }

            /* 40% 節點：紅色球體 (圓形) */
            40% {
                background-color: #ff0055;
                clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); /* 清除裁切 */
                border-radius: 50%;
                transform: scale(0.9) rotateX(180deg);
                filter: drop-shadow(0 0 20px #ff0055);
            }

            /* 60% 節點：紫色菱形 */
            60% {
                background-color: #a020f0;
                border-radius: 0%;
                clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
                transform: scale(1) rotate(240deg);
                filter: drop-shadow(0 0 25px #a020f0);
            }

            /* 80% 節點：黃色八邊形 (最大縮放) */
            80% {
                background-color: #ffee00;
                border-radius: 0%;
                clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
                transform: scale(1.3) rotate(360deg);
                filter: drop-shadow(0 0 35px #ffee00);
            }
        }
    </style>
</head>
<body>

    <div class="stage">
        
        <div class="track-line"></div>

        <div class="label label-0">
            0% Start (0s) → Blue Square
        </div>

        <div class="label label-20">
            20% Morph (2s) → Green Triangle (Spining)
        </div>

        <div class="label label-40">
            40% Morph (4s) → Red Sphere
        </div>

        <div class="label label-60">
            60% Morph (6s) → Purple Rhombus
        </div>

        <div class="label label-80">
            80% Max Scale (8s) → Yellow Octagon
        </div>

        <div class="cosmic-carrier">
            <div class="morph-core">
                Cosmic<br>Morph
            </div>
        </div>

    </div>

</body>
</html>
