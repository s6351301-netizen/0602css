<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>15星聯動：分時登場與獨立多軌跡變形動畫</title>
    <style>
        /* 全域初始化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* -------------------------------------------------------
           1. 全網頁大背景：星海無限流動特效
           ------------------------------------------------------- */
        body {
            background-color: #03050a;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px),
                radial-gradient(circle at center, #111a36 0%, #03050a 70%);
            background-size: 550px 550px, 350px 350px, 250px 250px, 100% 100%;
            background-attachment: fixed;
            
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;

            animation: starStream 60s infinite linear;
        }

        @keyframes starStream {
            0% { background-position: 0 0, 0 0, 0 0, center; }
            100% { background-position: 550px 1100px, -350px 700px, 500px -500px, center; }
        }

        /* -------------------------------------------------------
           2. 網頁版面主畫布（內嵌毛玻璃質感）
           ------------------------------------------------------- */
        .stage {
            position: relative;
            width: 1100px;
            height: 800px;
            background: rgba(10, 15, 30, 0.2); 
            backdrop-filter: blur(5px); 
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
        }

        /* 核心大群組：控制 15 顆星整體漂移與 100% -> 95% -> 90% 縮放 */
        .galaxy-group {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            animation: groupSuperFloat 24s infinite ease-in-out;
            transform-origin: center center;
        }

        @keyframes groupSuperFloat {
            0% { transform: translate(0px, 0px) scale(1); }
            25% { transform: translate(50px, -40px) scale(0.95); }
            50% { transform: translate(0px, -70px) scale(0.90); }
            75% { transform: translate(-50px, -40px) scale(0.95); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        /* -------------------------------------------------------
           3. 基礎幾何圖形通用設定
           ------------------------------------------------------- */
        .cosmic-carrier {
            position: absolute;
            width: 75px; /* 稍微縮小尺寸，讓 15 顆星並存時畫面更精緻 */
            height: 75px;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; /* 預設先隱藏，等 animation-delay 時間到才現身 */
            animation-fill-mode: forwards !important; /* 確保動畫結束或循環時維持顯示 */
        }

        .morph-core {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            color: #ffffff;
        }

        /* 軌跡公轉基本控制（現身並開始跑 offset-path） */
        @keyframes moveOrbit {
            0% { opacity: 1; offset-distance: 0%; }
            100% { opacity: 1; offset-distance: 100%; }
        }

        /* -------------------------------------------------------
           4. 15 個圖形各自獨立定義（軌跡、速度、形狀、變色、登場延遲）
           ------------------------------------------------------- */

        /* === 【第一區：一開始同時畫出來的 5 個圖形】 === */
        
        /* 1. 藍色正方形 (內圈圓軌跡，速度 12s，延遲 0s) */
        .star-1 {
            offset-path: path('M 550,180 A 220,220 0 1,1 549.9,180 Z');
            animation: moveOrbit 12s infinite linear;
        }
        .star-1 .morph-core {
            background-color: #00d2ff;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
            filter: drop-shadow(0 0 12px #00d2ff);
            animation: rotateSelf 4s infinite linear;
        }

        /* 2. 綠色三角形 (內圈圓軌跡，速度 9s，延遲 0s) */
        .star-2 {
            offset-path: path('M 550,180 A 220,220 0 1,1 549.9,180 Z');
            animation: moveOrbit 9s infinite linear;
        }
        .star-2 .morph-core {
            background-color: #00ff87;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            filter: drop-shadow(0 0 12px #00ff87);
            animation: flipY 3s infinite ease-in-out;
        }

        /* 3. 紅色圓形 (內圈圓軌跡，速度 7s，延遲 0s) */
        .star-3 {
            offset-path: path('M 550,180 A 220,220 0 1,1 549.9,180 Z');
            animation: moveOrbit 7s infinite linear;
        }
        .star-3 .morph-core {
            background-color: #ff0055;
            border-radius: 50%;
            filter: drop-shadow(0 0 12px #ff0055);
            animation: pulseScale 2.5s infinite ease-in-out;
        }

        /* 4. 紫色菱形 (橫向中橢圓，速度 14s，延遲 0s) */
        .star-4 {
            offset-path: path('M 550,260 A 320,140 0 1,1 549.9,260 Z');
            animation: moveOrbit 14s infinite linear;
        }
        .star-4 .morph-core {
            background-color: #a020f0;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            filter: drop-shadow(0 0 12px #a020f0);
            animation: rotateSelf 6s infinite linear;
        }

        /* 5. 黃金八邊形 (縱向大橢圓，速度 10s，延遲 0s) */
        .star-5 {
            offset-path: path('M 550,100 A 160,300 0 1,1 549.9,100 Z');
            animation: moveOrbit 10s infinite linear;
            color: #000;
        }
        .star-5 .morph-core {
            background-color: #ffd700;
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            filter: drop-shadow(0 0 12px #ffd700);
            animation: hueShift 5s infinite linear;
        }


        /* === 【第二區：不同時間依序跳出的 10 個圖形 (設定 animation-delay)】 === */
        
        /* 6. 梯形 (延遲 1 秒出現，速度 11s) */
        .star-6 {
            offset-path: path('M 550,180 A 220,220 0 1,1 549.9,180 Z');
            animation: moveOrbit 11s infinite linear;
            animation-delay: 1s;
        }
        .star-6 .morph-core {
            background-color: #ff5500;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            filter: drop-shadow(0 0 12px #ff5500);
        }

        /* 7. 五角星形 (延遲 2 秒出現，速度 13s) */
        .star-7 {
            offset-path: path('M 550,260 A 320,140 0 1,1 549.9,260 Z');
            animation: moveOrbit 13s infinite linear;
            animation-delay: 2s;
        }
        .star-7 .morph-core {
            background-color: #ff00ff;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            filter: drop-shadow(0 0 12px #ff00ff);
            animation: rotateSelf 5s infinite linear;
        }

        /* 8. 六邊形 (延遲 3 秒出現，速度 8s) */
        .star-8 {
            offset-path: path('M 550,100 A 160,300 0 1,1 549.9,100 Z');
            animation: moveOrbit 8s infinite linear;
            animation-delay: 3s;
        }
        .star-8 .morph-core {
            background-color: #00ffcc;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            filter: drop-shadow(0 0 12px #00ffcc);
            animation: flipX 4s infinite ease-in-out;
        }

        /* 9. 平行四邊形 (延遲 4 秒出現，速度 15s) */
        .star-9 {
            offset-path: path('M 550,60 A 420,340 0 1,1 549.9,60 Z'); /* 外圍特大橢圓 */
            animation: moveOrbit 15s infinite linear;
            animation-delay: 4s;
        }
        .star-9 .morph-core {
            background-color: #7fff00;
            clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%);
            filter: drop-shadow(0 0 12px #7fff00);
        }

        /* 10. 十字形 (延遲 5 秒出現，速度 10s) */
        .star-10 {
            offset-path: path('M 550,60 A 420,340 0 1,1 549.9,60 Z');
            animation: moveOrbit 10s infinite linear;
            animation-delay: 5s;
        }
        .star-10 .morph-core {
            background-color: #ff3333;
            clip-path: polygon(35% 0%, 65% 0%, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0% 65%, 0% 35%, 35% 35%);
            filter: drop-shadow(0 0 12px #ff3333);
            animation: pulseScale 2s infinite ease-in-out;
        }

        /* 11. 內凹四角星 (延遲 6 秒出現，速度 12s) */
        .star-11 {
            offset-path: path('M 550,180 A 220,220 0 1,1 549.9,180 Z');
            animation: moveOrbit 12s infinite linear;
            animation-delay: 6s;
        }
        .star-11 .morph-core {
            background-color: #e6e6fa;
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            filter: drop-shadow(0 0 12px #e6e6fa);
        }

        /* 12. 右箭頭形 (延遲 7 秒出現，速度 9s) */
        .star-12 {
            offset-path: path('M 550,260 A 320,140 0 1,1 549.9,260 Z');
            animation: moveOrbit 9s infinite linear;
            animation-delay: 7s;
        }
        .star-12 .morph-core {
            background-color: #e0115f;
            clip-path: polygon(0% 20%, 60% 20%, 60% 0%, 100% 50%, 60% 100%, 60% 80%, 0% 80%);
            filter: drop-shadow(0 0 12px #e0115f);
        }

        /* 13. 蛋形/不規則圓 (延遲 8 秒出現，速度 6s) */
        .star-13 {
            offset-path: path('M 550,100 A 160,300 0 1,1 549.9,100 Z');
            animation: moveOrbit 6s infinite linear;
            animation-delay: 8s;
        }
        .star-13 .morph-core {
            background-color: #ff7f50;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; /* 液態蛋形 */
            filter: drop-shadow(0 0 12px #ff7f50);
            animation: flipY 2s infinite linear;
        }

        /* 14. 房屋五角形 (延遲 9 秒出現，速度 14s) */
        .star-14 {
            offset-path: path('M 550,60 A 420,340 0 1,1 549.9,60 Z');
            animation: moveOrbit 14s infinite linear;
            animation-delay: 9s;
        }
        .star-14 .morph-core {
            background-color: #4b0082;
            clip-path: polygon(50% 0%, 100% 40%, 100% 100%, 0% 100%, 0% 40%);
            filter: drop-shadow(0 0 12px #4b0082);
        }

        /* 15. 水滴葉片形 (延遲 10 秒出現，速度 11s) */
        .star-15 {
            offset-path: path('M 550,260 A 320,140 0 1,1 549.9,260 Z');
            animation: moveOrbit 11s infinite linear;
            animation-delay: 10s;
        }
        .star-15 .morph-core {
            background-color: #gold;
            background: linear-gradient(45deg, #ffee00, #ff5500);
            border-radius: 0% 50% 50% 50%; /* 水滴葉片狀 */
            transform: rotate(45deg);
            filter: drop-shadow(0 0 15px #ffee00);
            animation: hueShift 6s infinite linear;
        }

        /* -------------------------------------------------------
           5. 子元件自轉與變形專用 Keyframes
           ------------------------------------------------------- */
        @keyframes rotateSelf { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes flipY { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(180deg); } }
        @keyframes flipX { 0%, 100% { transform: rotateX(0deg); } 50% { transform: rotateX(180deg); } }
        @keyframes pulseScale { 0%, 100% { transform: scale(0.9); } 50% { transform: scale(1.15); } }
        @keyframes hueShift { 0% { filter: drop-shadow(0 0 12px #ffd700) hue-rotate(0deg); } 100% { filter: drop-shadow(0 0 12px #ffd700) hue-rotate(360deg); } }

        /* 介面標籤 */
        .interface-label {
            position: absolute;
            top: 30px;
            left: 40px;
            pointer-events: none;
            z-index: 100;
        }
        .interface-label h1 { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .interface-label p { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.6; }
    </style>
</head>
<body>

    <div class="stage">
        
        <div class="interface-label">
            <h1>15星聯動高階星系系統</h1>
            <p>
                • <b>分時依序登場</b>：5 顆星初始並存 ➔ 10 顆星每隔 1 秒依序跳入軌道<br>
                • <b>獨立物理運動</b>：涵蓋正圓、水平橢圓、縱向橢圓、巨型外圍外框等四套獨立路徑<br>
                • <b>群組環境物理</b>：24 秒超平順全版面漂移與 100% ➔ 95% ➔ 90% 的呼吸律動
            </p>
        </div>

        <div class="galaxy-group">
            
            <div class="cosmic-carrier star-1"><div class="morph-core">Square</div></div>
            <div class="cosmic-carrier star-2"><div class="morph-core">Triangle</div></div>
            <div class="cosmic-carrier star-3"><div class="morph-core">Sphere</div></div>
            <div class="cosmic-carrier star-4"><div class="morph-core">Rhombus</div></div>
            <div class="cosmic-carrier star-5"><div class="morph-core">Octagon</div></div>

            <div class="cosmic-carrier star-6"><div class="morph-core">Trapezoid</div></div>
            <div class="cosmic-carrier star-7"><div class="morph-core">Pentagram</div></div>
            <div class="cosmic-carrier star-8"><div class="morph-core">Hexagon</div></div>
            <div class="cosmic-carrier star-9"><div class="morph-core">Parallelogram</div></div>
            <div class="cosmic-carrier star-10"><div class="morph-core">Cross</div></div>
            <div class="cosmic-carrier star-11"><div class="morph-core">Star4</div></div>
            <div class="cosmic-carrier star-12"><div class="morph-core">Arrow</div></div>
            <div class="cosmic-carrier star-13"><div class="morph-core">Fluid</div></div>
            <div class="cosmic-carrier star-14"><div class="morph-core">House</div></div>
            <div class="cosmic-carrier star-15"><div class="morph-core">Leaf</div></div>

        </div> </div>

</body>
</html>
