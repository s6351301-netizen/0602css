<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 100%;
            margin: auto;
        }

        table,
        th,
        td {
            /* border: 1px solid black; */
            border: 20px dashed black;
            border-collapse: collapse;
            text-align: center;
        }


        td {
            height: 400px;
            width: 25%;

        }


        .box {
            width: 276px;
            height: 398px;
            background-color: lightblue;
            background-image: url('./images/one.png');
            margin: auto;
            margin-bottom: 30px;
            margin-top: 30px;

            transition: all 2s;
            /* transition: width 3s; */

        }

        .box:hover{
            transform: scale(1.5) rotate(30deg);
        }



        .box11 {

            background-position: -26px -9px;
        }

        .box12 {
            background-position: -354px -9px;
        }

        .box13 {
            background-position: -681px -9px;
        }

        .box21 {

            background-position: -26px 393px;
        }

        .box22 {
            background-position: -354px 393px;
        }

        .box23 {
            background-position: -681px 393px;
        }
    </style>
</head>

    <table>

            <td>

            </td>
            <td>

            <td>

        <tr>

            </td>
           

        </tr>
    </table>
</body>

</html>
