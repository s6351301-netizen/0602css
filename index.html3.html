<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>獨立雙軌跡幾何變形動畫</title>
    <style>
        /* 全域初始化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #05070f;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        /* 主畫布空間 */
        .stage {
            position: relative;
            width: 800px;
            height: 600px;
            background: radial-gradient(circle at center, #111a36 0%, #05070f 70%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* -------------------------------------------------------
           【第一組：正圓形軌跡與五態變形】
           ------------------------------------------------------- */
        /* 第一組背景正圓軌跡線 */
        .track-line-1 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 360px;
            height: 360px;
            border: 2px dashed rgba(0, 210, 255, 0.15); /* 藍色系虛線 */
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* 第一組運動載體 */
        .carrier-level-1 {
            position: absolute;
            width: 100px;
            height: 100px;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 繞中心點 (400, 300) 半徑 180 的正圓路徑 */
            offset-path: path('M 400,120 A 180,180 0 1,1 399.9,120 Z'); 
            animation: orbitMove1 12s infinite linear;
        }

        /* 第一組變形本體 */
        .morph-core-1 {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            animation: shapeMorph1 12s infinite linear;
        }

        /* -------------------------------------------------------
           【第二組：黃金獨立橢圓形軌跡與兩態變形】
           ------------------------------------------------------- */
        /* 第二組背景橢圓軌跡線（水平寬 540px，垂直高 240px，居中） */
        .track-line-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 540px;
            height: 240px;
            border: 2px dotted rgba(255, 215, 0, 0.15); /* 黃金色系點線 */
            border-radius: 50%; /* 寬高不同即自動形成橢圓 */
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* 第二組運動載體（完全獨立，不再寫在第一組內部） */
        .carrier-level-2 {
            position: absolute;
            width: 80px;
            height: 80px;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 以畫布中心為基準的橢圓路徑 (長半徑 270, 短半徑 120) */
            offset-path: path('M 400,180 A 270,120 0 1,1 399.9,180 Z'); 
            animation: orbitMove2 8s infinite linear; /* 獨立設定速度為 8 秒一圈 */
        }

        /* 第二組黃金變形本體 */
        .morph-core-2 {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            color: #000; /* 黑字在黃金背景上易讀 */
            animation: shapeMorph2 8s infinite linear;
        }

        /* -------------------------------------------------------
           純 CSS 動態影格控制 (Keyframes)
           ------------------------------------------------------- */
        /* 軌跡位移動畫（兩組各自獨立跑自己的 offset-path） */
        @keyframes orbitMove1 { 0% { offset-distance: 0%; } 100% { offset-distance: 100%; } }
        @keyframes orbitMove2 { 0% { offset-distance: 0%; } 100% { offset-distance: 100%; } }

        /* 第一組：五模組形狀動態 (藍方->綠三->紅圓->紫菱->黃八) */
        @keyframes shapeMorph1 {
            0%, 100% {
                background-color: #00d2ff;
                clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
                border-radius: 0%;
                transform: scale(1) rotate(0deg);
                filter: drop-shadow(0 0 15px #00d2ff);
            }
            25% {
                background-color: #00ff87;
                clip-path: polygon(50% 0%, 100% 100%, 100% 100%, 0% 100%);
                border-radius: 0%;
                transform: scale(1.1) rotate(120deg) rotateY(180deg);
                filter: drop-shadow(0 0 25px #00ff87);
            }
            50% {
                background-color: #ff0055;
                clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
                border-radius: 50%;
                transform: scale(0.9) rotateX(180deg);
                filter: drop-shadow(0 0 20px #ff0055);
            }
            75% {
                background-color: #a020f0;
                border-radius: 0%;
                clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
                transform: scale(1) rotate(240deg);
                filter: drop-shadow(0 0 25px #a020f0);
            }
        }

        /* 第二組：獨立黃金幾何 (0% 方形 ➔ 50% 變身菱形 ➔ 100% 回歸方形) */
        @keyframes shapeMorph2 {
            0%, 100% {
                background-color: #ffd700; /* 黃金色 */
                clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); /* 正方形 */
                transform: scale(1) rotate(0deg);
                filter: drop-shadow(0 0 12px #ffd700);
            }
            50% {
                background-color: #ffaa00; /* 琥珀金 */
                clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); /* 變身菱形 */
                transform: scale(1.1) rotate(180deg); /* 附帶流暢旋轉 */
                filter: drop-shadow(0 0 22px #ffaa00);
            }
        }

        /* 介面標籤 */
        .label { position: absolute; font-size: 13px; color: rgba(255,255,255,0.4); pointer-events: none; }
        .label-title { top: 30px; left: 40px; font-size: 16px; color: #fff; font-weight: bold; }
        .label-sub { top: 55px; left: 40px; font-size: 12px; color: #ffd700; }
    </style>
</head>
<body>

    <div class="stage">
        
        <div class="label label-title">獨立雙路徑幾何運動系統</div>
        <div class="label label-sub">第一組：藍/綠/紅/紫（正圓軌跡） ｜ 第二組：黃金方形/菱形（獨立橢圓軌跡）</div>

        <div class="track-line-1"></div>
        <div class="track-line-2"></div>

        <div class="carrier-level-1">
            <div class="morph-core-1">
                Orbit 1<br>Core
            </div>
        </div>

        <div class="carrier-level-2">
            <div class="morph-core-2">
                Gold<br>Elliptic
            </div>
        </div>

    </div>

</body>
</html>
